<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Teste dein Wissen! Gib Ländernamen ein und fülle die Weltkarte aus. Wie viele der 193 UN-Mitgliedsstaaten kennst du?">
  <title>🌍 Länder-Quiz — Fülle die Weltkarte!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-title">
      <span class="globe-icon">🌍</span>
      <h1>Länder-Quiz</h1>
    </div>
    <div class="header-stats">
      <div class="stat-item">
        <span>Gefunden:</span>
        <span class="stat-value highlight" id="found-count">0</span>
      </div>
      <div class="stat-item">
        <span>Gesamt:</span>
        <span class="stat-value" id="total-count">193</span>
      </div>
    </div>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="main-container">

    <!-- MAP AREA -->
    <div class="map-container" id="map-container">
      <!-- SVG will be loaded here -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="Hineinzoomen">+</button>
        <button class="zoom-btn" id="zoom-out" title="Herauszoomen">−</button>
        <button class="zoom-btn" id="zoom-reset" title="Zurücksetzen" style="font-size:13px">↺</button>
      </div>
    </div>

    <!-- MAP TOOLTIP -->
    <div class="map-tooltip" id="map-tooltip"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- INPUT SECTION -->
      <div class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            id="country-input"
            placeholder="Ländername eingeben..."
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          >
          <button class="submit-btn" id="submit-btn" title="Absenden">→</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>

      <!-- PROGRESS -->
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Fortschritt</span>
          <span class="progress-count" id="progress-count">0 / 193</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div style="text-align:right;margin-top:4px">
          <span style="font-size:12px;color:var(--text-muted);font-weight:600" id="progress-pct">0%</span>
        </div>
      </div>

      <!-- TIMER -->
      <div class="timer-section">
        <span class="timer-display" id="timer-display">15:00</span>
        <div class="timer-controls">
          <button class="timer-btn" id="timer-toggle" title="Pause/Fortsetzen">▶</button>
          <button class="timer-btn" id="timer-reset" title="Timer zurücksetzen">↺</button>
        </div>
      </div>

      <!-- FOUND LIST -->
      <div class="found-section">
        <div class="found-header">
          <span class="found-title">Gefundene Länder</span>
        </div>
        <div class="found-list" id="found-list"></div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="action-section">
        <button class="action-btn danger" id="give-up-btn">Aufgeben</button>
        <button class="action-btn primary" id="restart-btn">Neu starten</button>
      </div>

    </aside>
  </div>

  <!-- COMPLETION OVERLAY -->
  <div class="completion-overlay" id="completion-overlay">
    <div class="completion-card">
      <div class="trophy" id="completion-trophy">🏆</div>
      <h2 id="completion-title">Glückwunsch!</h2>
      <p id="completion-message">Du hast alle Länder der Welt gefunden!</p>
      <div class="completion-stats">
        <div class="completion-stat">
          <div class="value" id="completion-found-value">0/193</div>
          <div class="label">Gefunden</div>
        </div>
        <div class="completion-stat">
          <div class="value" id="completion-time-value">0:00</div>
          <div class="label">Zeit</div>
        </div>
        <div class="completion-stat">
          <div class="value" id="completion-pct-value">0%</div>
          <div class="label">Quote</div>
        </div>
      </div>
      <button class="restart-btn" id="restart-btn-overlay">🔄 Nochmal spielen</button>
    </div>
  </div>

  <script src="countries.js"></script>
  <script src="app.js"></script>
  <script>
    // Load SVG map inline
    fetch('world-map.svg')
      .then(r => r.text())
      .then(svgText => {
        const container = document.getElementById('map-container');
        // Insert SVG before zoom controls
        const zoomControls = container.querySelector('.zoom-controls');
        const div = document.createElement('div');
        div.innerHTML = svgText;
        const svg = div.querySelector('svg');
        // Remove fixed width/height to make responsive
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.style.width = '100%';
        svg.style.height = '100%';
        container.insertBefore(svg, zoomControls);

        // Re-initialize game after SVG is loaded
        initGame();
      })
      .catch(err => {
        console.error('Failed to load map:', err);
        document.getElementById('map-container').innerHTML = '<p style="padding:40px;color:#f87171;">Fehler: Karte konnte nicht geladen werden.</p>';
      });
  </script>
</body>
</html>
